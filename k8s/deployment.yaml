---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alphaflow
  namespace: qmcp-services
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::803031031627:role/qmcp-irsa-alphaflow
---
apiVersion: v1
kind: Service
metadata:
  name: alphaflow
  namespace: qmcp-services
  labels:
    app: alphaflow
spec:
  type: ClusterIP
  selector:
    app: alphaflow
  ports:
    - name: http
      port: 8025
      targetPort: 8025
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaflow
  namespace: qmcp-services
  labels:
    app: alphaflow
spec:
  # scale-to-zero default. Set to 0 by default; cluster-autoscaler will not
  # spin a GPU node until a replica is requested. Bump to 1 to warm up.
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alphaflow
  template:
    metadata:
      labels:
        app: alphaflow
    spec:
      serviceAccountName: alphaflow
      terminationGracePeriodSeconds: 60
      # Land on the GPU nodegroup (taint + nodeSelector).
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: alphaflow
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8025
          env:
            - name: PORT
              value: "8025"
            - name: AWS_REGION
              value: us-east-1
            - name: REDIS_URL
              value: "redis://qmcp-redis.h2uwye.ng.0001.use1.cache.amazonaws.com:6379/0"
            # S3 for ensemble PDB + metadata. IRSA on qmcp-irsa-alphaflow
            # grants s3:PutObject on qmcp-data-lake/alphaflow/*.
            - name: ALPHAFLOW_RESULTS_BUCKET
              value: qmcp-data-lake
            - name: ALPHAFLOW_RESULTS_PREFIX
              value: "alphaflow/"
            # In-cluster sibling services (consolidated under qmcp-services)
            - name: ADDIE_SERVICE_URL
              value: http://addie-models.qmcp-services.svc.cluster.local:8025
            - name: GROMACS_SERVICE_URL
              value: http://gromacs-md.qmcp-services.svc.cluster.local:8024
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: alphaflow-api-key
                  key: api_key
            # Sibling API keys (will be wired when those services need them)
            - name: ADDIE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: addie-models-api-key
                  key: api_key
                  optional: true
            - name: GROMACS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gromacs-md-api-key
                  key: api_key
                  optional: true
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: 1
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet: { path: /health, port: 8025 }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /health, port: 8025 }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 6
